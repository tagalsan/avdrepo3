
name: quality gate check
on:
    push:
        branches:
            - main

jobs:
    ci-job:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: installing dependancies
              run: pip install -r requirements.txt
            - name: run test and enforce coverage
              run: |
                pytest --cov=calc --cov-report=term --cov-report=html --cov-fail-under=80
            - name: Upload HTML Report
              uses: actions/upload-artifact@v4
              with:
                name: html-report
                path: report.html
            
    cd-job:
        runs-on: ubuntu-latest
        needs: ci-job
        steps:
            - name: checkout code 
              uses: actions/checkout@v4
            - name: print message
              run: echo "deployment done..."